<VirtualHost *:80>
    DocumentRoot /var/www/html
    Alias /Styles /var/www/Styles

    <Directory /var/www/Styles>
        Require all granted
    </Directory>

    <Directory /var/www/html>
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^(.*)$ index.php?route=$1 [QSA,L]
    </Directory>
</VirtualHost>